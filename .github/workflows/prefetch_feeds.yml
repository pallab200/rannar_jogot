name: Prefetch Feeds

on:
  workflow_dispatch:
    inputs:
      pages:
        description: Pages to prefetch per feed
        required: false
        default: '1'
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: prefetch-feeds
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Regenerate feed snapshots
        run: |
          if [ -z "${{ secrets.YOUTUBE_API_KEY }}" ]; then
            echo "YOUTUBE_API_KEY secret is not configured. Skipping feed refresh."
            exit 0
          fi

          PAGES="${{ github.event.inputs.pages }}"
          if [ -z "$PAGES" ]; then
            PAGES=1
          fi

          dart run -DYOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }} tool/prefetch_feeds.dart --output prefetched_feeds --pages "$PAGES"

      - name: Commit updated feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- prefetched_feeds; then
            echo "No prefetched feed changes."
            exit 0
          fi
          git add prefetched_feeds
          git commit -m "chore: refresh prefetched feeds"
          git push origin HEAD:${GITHUB_REF_NAME}