name: Prefetch Feeds

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/prefetch_feeds.yml'
      - 'tool/prefetch_feeds.dart'
      - 'lib/utils/constants.dart'
      - 'lib/services/youtube_service.dart'
      - 'lib/services/video_feed_service.dart'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  workflow_dispatch:
    inputs:
      pages:
        description: Pages to prefetch per feed
        required: false
        default: '1'
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: prefetch-feeds
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Regenerate feed snapshots
        run: |
          if [ -z "${{ secrets.YOUTUBE_API_KEY }}" ]; then
            echo "YOUTUBE_API_KEY secret is not configured. Skipping feed refresh."
            exit 0
          fi

          PAGES="${{ github.event.inputs.pages }}"
          if [ -z "$PAGES" ]; then
            PAGES=1
          fi

          dart run -DYOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }} tool/prefetch_feeds.dart --output prefetched_feeds --pages "$PAGES"

      - name: Commit updated feeds
        id: commit_feeds
        run: |
          if [ ! -d prefetched_feeds ]; then
            echo "No prefetched feed snapshot available to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- prefetched_feeds; then
            echo "No prefetched feed changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add prefetched_feeds
            git commit -m "chore: refresh prefetched feeds"
            git push origin HEAD:${GITHUB_REF_NAME}
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check feed output
        id: check_feeds
        run: |
          if [ -d prefetched_feeds ] && find prefetched_feeds -type f | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "No prefetched feed output available to publish yet."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Pages artifact
        if: steps.check_feeds.outputs.has_files == 'true'
        run: |
          mkdir -p site/prefetched_feeds
          cp -R prefetched_feeds/. site/prefetched_feeds/
          cat <<'EOF' > site/index.html
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>Rannar Jogot Feeds</title>
            </head>
            <body>
              <p>Rannar Jogot prefetched feeds are published here.</p>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        if: steps.check_feeds.outputs.has_files == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.check_feeds.outputs.has_files == 'true'
        id: deployment
        uses: actions/deploy-pages@v4