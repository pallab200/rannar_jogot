name: rannar_jogot
description: "Bangladeshi Cooking Video App - Auto-categorized YouTube recipes"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  youtube_player_iframe: ^6.0.0
  provider: ^6.1.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  shared_preferences: ^2.2.0
  google_fonts: ^6.1.0
  url_launcher: ^6.2.0
  connectivity_plus: ^5.0.0
  google_mobile_ads: ^8.0.0
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#FFF4E8"
  adaptive_icon_foreground: assets/icons/app_icon_foreground.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
